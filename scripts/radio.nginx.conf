limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name lavozverdad.com www.lavozverdad.com;

    root /var/www/radio/apps/web/dist;
    index index.html;

    location ~* /(wp-admin|wp-login|wp-content|wp-includes|wordpress|phpmyadmin|xmlrpc\.php|\.env|\.git|setup-config|config\.php) {
        return 444;
    }

    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl)$ {
        return 444;
    }

    if ($http_user_agent = "") {
        return 444;
    }

    location /listen/la_voz_de_la_verdad/ {
        proxy_pass         http://127.0.0.1:8080/listen/la_voz_de_la_verdad/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_read_timeout 3600s;

        limit_conn conn_limit 5;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        limit_req zone=api burst=20 nodelay;
    }

    location /admin-api/ {
        allow 127.0.0.1;
        allow 190.128.18.34; 
        deny all;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /webhook/ {
        proxy_pass         http://127.0.0.1:3000/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        limit_req zone=general burst=5 nodelay;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;

        limit_conn conn_limit 10;
    }

    location /panel-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "null";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "x-panel-secret, content-type";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }

        proxy_pass         http://127.0.0.1:3000/panel-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   x-panel-secret $http_x_panel_secret;
    }

    location / {
        try_files $uri $uri/ /index.html;
        limit_req zone=general burst=10 nodelay;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

server {
    listen 80;
    server_name panel.lavozverdad.com;

    client_max_body_size 512M;

    auth_basic "Acceso restringido";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}