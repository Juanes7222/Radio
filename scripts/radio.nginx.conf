map $http_origin $cors_origin {
    default "";
    "~^https?://(www\.)?lavozverdad\.com$" $http_origin;
    "~^https?://(www\.)?vozyverdad\.com$" $http_origin;
    "~^http://localhost(:\d+)?$" $http_origin;
    "null"                      "null";
}

server {
    listen 80;
    server_name lavozverdad.com www.lavozverdad.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;

    server_name lavozverdad.com www.lavozverdad.com;

    ssl_certificate      /etc/letsencrypt/live/lavozverdad.com/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/lavozverdad.com/privkey.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  10m;
    ssl_stapling         on;
    ssl_stapling_verify  on;
    resolver             1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout     5s;

    root  /var/www/radio/apps/web/dist;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-//G19Hq3BLQ3HQyyyR3t+wwG1va20PazY8GHIAHR+gI=' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; media-src 'self' https:; connect-src 'self' https://lavozverdad.com https://www.lavozverdad.com wss://lavozverdad.com wss://www.lavozverdad.com; frame-src https://www.facebook.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    if ($http_user_agent = "") { return 444; }

    location ~* /(wp-admin|wp-login|wp-content|wp-includes|wordpress|phpmyadmin|xmlrpc\.php|\.env|\.git|setup-config|config\.php|\.htaccess|\.htpasswd) {
        return 444;
    }
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb|lua)$ {
        return 444;
    }

    location /listen/la_voz_de_la_verdad/ {
        proxy_pass         http://127.0.0.1:8080/listen/la_voz_de_la_verdad/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        limit_conn         conn_limit 5;
    }

    location /api/live/ {
        proxy_pass         http://127.0.0.1:8080/api/live/;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "Upgrade";
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "content-type, authorization, cache-control" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length                   0;
            return 204;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        add_header        Access-Control-Allow-Origin $cors_origin always;
        add_header        Access-Control-Allow-Credentials "true" always;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        keep-alive;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        limit_req          zone=api burst=20 nodelay;
    }

    location /api/station/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /admin-api/ {
        allow 127.0.0.1;
        deny  all;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        keep-alive;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    location /webhook/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "content-type, x-webhook-secret" always;
            add_header Content-Length               0;
            return 204;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;

        proxy_pass         http://127.0.0.1:3000/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        limit_req          zone=general burst=5 nodelay;
    }

    location /ws {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 86400;
        limit_conn         conn_limit 10;
    }

    location /panel-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "content-type, authorization, cache-control" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length                   0;
            return 204;
        }

        proxy_pass         http://127.0.0.1:3000/panel-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   x-panel-secret    $http_x_panel_secret;
        limit_req          zone=general burst=10 nodelay;
    }

    location /live-status/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "content-type, authorization, cache-control" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length                   0;
            return 204;
        }

        proxy_hide_header  Access-Control-Allow-Origin;
        add_header         Access-Control-Allow-Origin      $cors_origin always;
        add_header         Access-Control-Allow-Credentials "true"        always;

        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  3600s;
        chunked_transfer_encoding on;
    limit_conn          conn_limit 10;
    }

    location /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
        limit_req zone=general burst=10 nodelay;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires    30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}

server {
    listen 80;
    server_name panel.lavozverdad.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;

    server_name panel.lavozverdad.com;

    ssl_certificate      /etc/letsencrypt/live/lavozverdad.com/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/lavozverdad.com/privkey.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"   always;
    add_header X-Frame-Options           "DENY"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                always;
    add_header Referrer-Policy           "no-referrer"                            always;
    add_header X-XSS-Protection          "1; mode=block"                          always;
    add_header X-Robots-Tag              "noindex, nofollow"                      always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss://panel.lavozverdad.com; frame-ancestors 'none'; form-action 'self';" always;

    client_max_body_size 512M;

    auth_basic           "Restricted access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_hide_header  Content-Security-Policy;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

