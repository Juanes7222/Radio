server {
    listen 80;
    server_name lavozverdad.com www.lavozverdad.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lavozverdad.com www.lavozverdad.com;

    ssl_certificate     /etc/letsencrypt/live/lavozverdad.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lavozverdad.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    root  /var/www/radio/apps/web/dist;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header X-XSS-Protection          "1; mode=block"                                always;

    if ($http_user_agent = "") {
        return 444;
    }

    location ~* /(wp-admin|wp-login|wp-content|wp-includes|wordpress|phpmyadmin|xmlrpc\.php|\.env|\.git|setup-config|config\.php|\.htaccess|\.htpasswd) {
        return 444;
    }

    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb|lua)$ {
        return 444;
    }

    location /listen/la_voz_de_la_verdad/ {
        proxy_pass         http://127.0.0.1:8080/listen/la_voz_de_la_verdad/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_read_timeout 3600s;

        limit_conn conn_limit 5;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        limit_req zone=api burst=20 nodelay;
    }

    location /api/station/ {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
}

    location /admin-api/ {
        allow 127.0.0.1;
        deny all;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    location /webhook/ {
        proxy_pass         http://127.0.0.1:3000/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        limit_req zone=general burst=5 nodelay;
    }

    location /ws {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;

        limit_conn conn_limit 10;
    }

    location /panel-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "null";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "x-panel-secret, content-type";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }

        proxy_pass         http://127.0.0.1:3000/panel-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   x-panel-secret $http_x_panel_secret;

        limit_req zone=general burst=10 nodelay;
    }

    location / {
        try_files $uri $uri/ /index.html;
        limit_req zone=general burst=10 nodelay;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}


server {
    listen 80;
    server_name panel.lavozverdad.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name panel.lavozverdad.com;

    # All three domains share the same certificate
    ssl_certificate     /etc/letsencrypt/live/lavozverdad.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lavozverdad.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 512M;

    auth_basic           "Restricted access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

