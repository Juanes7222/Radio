<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="color-scheme" content="dark light" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    
    <!-- SEO -->
    <title>La Voz de la Verdad | Radio Cristiana Online</title>
    <meta name="description" content="Emisora cristiana online transmitiendo 24/7 desde Colombia. Escucha la mejor música de alabanza, adoración y mensajes bíblicos que edifican tu fe. Únete a nuestros cultos en vivo." />
    <meta name="keywords" content="radio cristiana, música cristiana, adoración, alabanza, predicaciones, iglesia cristiana, streaming cristiano, Jesús Adrián Romero, Marcos Witt, mensajes bíblicos, Cartago" />
    <meta name="author" content="La Voz de la Verdad" />
    
    <!-- Open Graph (Facebook/WhatsApp) -->
    <meta property="og:title" content="La Voz de la Verdad | Radio Cristiana" />
    <meta property="og:description" content="Acompáñanos 24/7 con la mejor música de alabanza, adoración y mensajes que edifican. Conéctate a nuestras transmisiones en vivo." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512x512.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="La Voz de la Verdad | Radio Cristiana" />
    <meta name="twitter:description" content="Acompáñanos 24/7 con la mejor música de alabanza, adoración y mensajes que edifican. Conéctate a nuestras transmisiones en vivo." />
    <meta name="twitter:image" content="/icon-512x512.png" />
    
    <!-- iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="La Voz de la Verdad" />
    
    <!-- Preconnect (Ajusta la URL de demo.azuracast.com por la IP/Dominio de tu VPS de Contabo cuando lo tengas) -->
    <link rel="preconnect" href="https://demo.azuracast.com" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-72x72.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-72x72.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
